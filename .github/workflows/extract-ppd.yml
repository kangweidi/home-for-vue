name: Extract Brother DCP-7030 PPD

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许在 GitHub Actions 页面手动触发执行

jobs:
  extract-ppd:
    # ubuntu-latest 基于 Debian/Ubuntu 系，完美支持 dpkg 和 apt-get 命令
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          echo "开启 i386 架构支持以安装 Brother 32位驱动..."
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y curl wget grep dpkg cups csh libc6:i386 libstdc++6:i386
          
          # 启动 cups 服务（部分驱动在注册 ppd 时可能需要连接 lpadmin）
          sudo systemctl start cups || true

      - name: Download Brother Driver
        run: |
          echo "正在从提供的链接中解析实际的 .deb 驱动下载地址..."
          PAGE_URL="https://support.brother.com/g/b/downloadend.aspx?c=cn&lang=zh&prod=dcp7030_all&os=128&dlid=dlf005513_000&flang=9&type3=561"
          
          # 抓取页面中的真实下载链接
          DEB_URL=$(curl -sL "$PAGE_URL" | grep -oE "https?://download\.brother\.com[^\"]+\.deb" | head -n 1)
          
          # 如果网页结构改变导致抓取失败，使用已知的备份直链
          if[ -z "$DEB_URL" ]; then
            echo "未能在页面找到链接，使用 Fallback 链接..."
            DEB_URL="https://download.brother.com/welcome/dlf005513/cupswrapperDCP7030-2.0.2-1.i386.deb"
          fi
          
          echo "获取到的驱动下载链接为: $DEB_URL"
          wget -O cupswrapper.deb "$DEB_URL"

      - name: Install Driver and Generate PPD
        run: |
          echo "建立驱动安装依赖目录..."
          sudo mkdir -p /var/spool/lpd
          sudo mkdir -p /usr/share/cups/model
          
          echo "强制安装 deb 驱动包 (这会触发内部脚本生成 PPD 文件)..."
          sudo dpkg -i --force-all cupswrapper.deb || true
          
          echo "部分情况 postinst 会失败，这里主动执行 wrapper 脚本以确保生成 PPD..."
          WRAPPER_SCRIPT=$(find /opt/brother -type f -name "cupswrapperDCP7030" 2>/dev/null | head -n 1)
          if[ -n "$WRAPPER_SCRIPT" ]; then
            sudo bash "$WRAPPER_SCRIPT" || true
          fi

      - name: Locate and Extract PPD File
        run: |
          mkdir -p output_ppd
          
          # 在系统中全局搜索生成的 7030 相关的 PPD 文件
          PPD_FILE=$(find /opt/brother /usr/share/cups /etc/cups -name "*.ppd" 2>/dev/null | grep -i 7030 | head -n 1)
          
          if [ -n "$PPD_FILE" ]; then
            echo "成功找到 PPD 文件: $PPD_FILE"
            cp "$PPD_FILE" output_ppd/
          else
            echo "未能找到 PPD 文件，请检查驱动包是否成功解压！"
            exit 1
          fi

      - name: Upload PPD Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Brother_DCP-7030_PPD
          path: output_ppd/*.ppd
          retention-days: 7
